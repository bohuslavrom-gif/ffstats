<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenérská analytika</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1a1a1a;padding:16px;}
h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.subtitle{font-size:13px;color:#888;margin-bottom:20px;}
.loading{text-align:center;color:#888;padding:40px;font-size:15px;}
.error{text-align:center;color:#c0392b;padding:20px;font-size:14px;}
.retry-btn{display:block;margin:12px auto;padding:10px 24px;border:1.5px solid #ddd;border-radius:10px;background:#fff;font-size:14px;cursor:pointer;}

.game-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.game-btn{padding:7px 14px;border:1.5px solid #ddd;border-radius:10px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#555;}
.game-btn.active{background:#1a56db;border-color:#1a56db;color:#fff;}
.game-btn.all{background:#f0f4ff;border-color:#1a56db;color:#1a56db;}

.section{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;}
.section-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}

.score-row{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0;}
.score-val{font-size:36px;font-weight:700;}
.score-sep{font-size:20px;color:#ccc;}
.score-label{font-size:12px;color:#888;text-align:center;margin-top:2px;}
.good{color:#0a7c3e;}
.bad{color:#c0392b;}
.warn{color:#b8860b;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f5f5f5;padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;border-bottom:1px solid #eee;}
td{padding:7px 8px;border-bottom:0.5px solid #f0f0f0;color:#1a1a1a;}
.num{text-align:right;}
.fw{font-weight:700;}

.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;color:#555;width:65px;flex-shrink:0;}
.bar-track{flex:1;background:#f0f0f0;border-radius:6px;height:22px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff;min-width:30px;}
.bar-pct{font-size:13px;font-weight:700;width:45px;text-align:right;}

.updated{font-size:11px;color:#bbb;text-align:right;margin-top:8px;}
</style>
</head>
<body>
<h1 id="widget-title">Trenérská analytika</h1>
<p class="subtitle">Statistiky pro trenéry</p>
<div id="game-selector" class="game-selector"></div>
<div id="stats-root"><div class="loading">Načítám data...</div></div>
<p class="updated" id="updated"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnC0nOo04RW3RtWGewd3uyTIZwMDmr_3LwUzaYuoId48llizfXpZCGGn9bnN344iH5PA/exec";
const DEFAULT_TEAM = "Muži";
const urlParams = new URLSearchParams(window.location.search);
const TEAM_NAME = urlParams.get('team') || DEFAULT_TEAM;
let allGames = [];
let selectedGame = 'all';

document.getElementById('widget-title').textContent = TEAM_NAME + ' — Trenérská analytika';

function loadData() {
  document.getElementById('stats-root').innerHTML = '<div class="loading">Načítám data...</div>';
  const cb = 'cb_' + Date.now();
  const sc = document.createElement('script');
  const tm = setTimeout(() => { cleanup(); showError('Časový limit vypršel.'); }, 10000);
  function cleanup() { clearTimeout(tm); delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc); }
  window[cb] = function(data) {
    cleanup();
    if (data && data.games) {
      allGames = data.games.sort((a,b) => a.game - b.game);
      renderSelector();
      renderAll();
      document.getElementById('updated').textContent = 'Aktualizováno: ' + new Date().toLocaleString('cs-CZ');
    } else {
      showError('Žádná data.');
    }
  };
  sc.src = API_URL + '?callback=' + cb + '&mode=coach&team=' + encodeURIComponent(TEAM_NAME);
  document.head.appendChild(sc);
}

function showError(msg) {
  document.getElementById('stats-root').innerHTML = '<div class="error">'+msg+'</div><button class="retry-btn" onclick="loadData()">Zkusit znovu</button>';
}

function renderSelector() {
  const el = document.getElementById('game-selector');
  let html = '<button class="game-btn all'+(selectedGame==='all'?' active':'')+'" onclick="selectGame(\'all\')">Celá sezóna</button>';
  allGames.forEach(g => {
    const active = selectedGame === g.game ? ' active' : '';
    const dateStr = g.date ? new Date(g.date).toLocaleDateString('cs-CZ') : '';
    const label = g.opponent ? 'vs '+g.opponent+' ('+dateStr+')' : 'Zápas '+g.game+' ('+dateStr+')';
    html += '<button class="game-btn'+active+'" onclick="selectGame('+g.game+')">'+label+'</button>';
  });
  el.innerHTML = html;
}

function selectGame(game) {
  selectedGame = game;
  renderSelector();
  renderAll();
}

function sum(arr, fn) { return arr.reduce((s,g) => s + (fn(g)||0), 0); }

function renderAll() {
  const games = selectedGame === 'all' ? allGames : allGames.filter(g => g.game === selectedGame);
  if (!games.length) { document.getElementById('stats-root').innerHTML = '<div class="loading">Žádné záznamy.</div>'; return; }

  // Agreguj
  const usTotal = sum(games, g => g.score.us);
  const themTotal = sum(games, g => g.score.them);
  const offTotal = sum(games, g => g.off.total);
  const offTD = sum(games, g => g.off.td);
  const defTotal = sum(games, g => g.def.total);
  const defStop = sum(games, g => g.def.stop);
  const offPct = offTotal > 0 ? Math.round(offTD/offTotal*100) : 0;
  const defPct = defTotal > 0 ? Math.round(defStop/defTotal*100) : 0;

  const c1 = sum(games, g => g.confirm.c1);
  const att1 = sum(games, g => g.confirm.att1);
  const c2 = sum(games, g => g.confirm.c2);
  const att2 = sum(games, g => g.confirm.att2);
  const c1pct = att1 > 0 ? Math.round(c1/att1*100) : 0;
  const c2pct = att2 > 0 ? Math.round(c2/att2*100) : 0;

  const oc1 = sum(games, g => g.oppConfirm.c1);
  const oatt1 = sum(games, g => g.oppConfirm.att1);
  const oc2 = sum(games, g => g.oppConfirm.c2);
  const oatt2 = sum(games, g => g.oppConfirm.att2);
  const def1pct = oatt1 > 0 ? Math.round((oatt1-oc1)/oatt1*100) : 0;
  const def2pct = oatt2 > 0 ? Math.round((oatt2-oc2)/oatt2*100) : 0;

  const foulCount = sum(games, g => g.fouls.count);
  const foulYards = sum(games, g => g.fouls.yards);

  let html = '';

  // Skóre
  const opponents = [...new Set(games.filter(g=>g.opponent).map(g=>g.opponent))].join(', ');
  html += '<div class="section">';
  html += '<div class="section-title">Skóre'+(opponents?' — vs '+opponents:'')+'</div>';
  html += '<div class="score-row">';
  html += '<div><div class="score-val good">'+usTotal+'</div><div class="score-label">Naše body</div></div>';
  html += '<div class="score-sep">:</div>';
  html += '<div><div class="score-val bad">'+themTotal+'</div><div class="score-label">Body soupeře</div></div>';
  html += '</div></div>';

  // Drivy
  if (offTotal || defTotal) {
    html += '<div class="section"><div class="section-title">Drivy</div>';
    html += '<div class="bar-row"><div class="bar-label">Útok</div><div class="bar-track"><div class="bar-fill" style="width:'+offPct+'%;background:#1a56db;">'+offPct+'%</div></div><div class="bar-pct good fw">'+offTD+'/'+offTotal+'</div></div>';
    html += '<div class="bar-row"><div class="bar-label">Obrana</div><div class="bar-track"><div class="bar-fill" style="width:'+defPct+'%;background:#0a7c3e;">'+defPct+'%</div></div><div class="bar-pct good fw">'+defStop+'/'+defTotal+'</div></div>';
    html += '</div>';
  }

  // Naše potvrzení
  if (att1 + att2 > 0) {
    html += '<div class="section"><div class="section-title">Útok — úspěšnost potvrzení</div>';
    html += '<table><thead><tr><th>Typ</th><th class="num">Úspěšné</th><th class="num">Pokusy</th><th class="num">%</th></tr></thead><tbody>';
    if(att1>0) html += '<tr><td>Za 1 bod</td><td class="num good fw">'+c1+'</td><td class="num">'+att1+'</td><td class="num '+(c1pct>=50?'good':'warn')+' fw">'+c1pct+'%</td></tr>';
    if(att2>0) html += '<tr><td>Za 2 body</td><td class="num good fw">'+c2+'</td><td class="num">'+att2+'</td><td class="num '+(c2pct>=50?'good':'warn')+' fw">'+c2pct+'%</td></tr>';
    html += '</tbody></table></div>';
  }

  // Obrana soupeřova potvrzení
  if (oatt1 + oatt2 > 0) {
    html += '<div class="section"><div class="section-title">Obrana — ubráněná potvrzení soupeře</div>';
    html += '<table><thead><tr><th>Typ</th><th class="num">Ubráněno</th><th class="num">Pokusy</th><th class="num">%</th></tr></thead><tbody>';
    if(oatt1>0) html += '<tr><td>Za 1 bod</td><td class="num good fw">'+(oatt1-oc1)+'</td><td class="num">'+oatt1+'</td><td class="num '+(def1pct>=50?'good':'warn')+' fw">'+def1pct+'%</td></tr>';
    if(oatt2>0) html += '<tr><td>Za 2 body</td><td class="num good fw">'+(oatt2-oc2)+'</td><td class="num">'+oatt2+'</td><td class="num '+(def2pct>=50?'good':'warn')+' fw">'+def2pct+'%</td></tr>';
    html += '</tbody></table></div>';
  }

  // Fauly
  if (foulCount > 0) {
    html += '<div class="section"><div class="section-title">Fauly</div>';
    html += '<table><thead><tr><th>Celkem faulů</th><th class="num">Yardy</th></tr></thead><tbody>';
    html += '<tr><td class="bad fw">'+foulCount+'</td><td class="num bad fw">-'+foulYards+'y</td></tr>';
    html += '</tbody></table></div>';
  }

  document.getElementById('stats-root').innerHTML = html;
}

loadData();
</script>
</body>
</html>
